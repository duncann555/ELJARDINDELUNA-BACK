<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>El Jardin de Luna Backend</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #f3eee8, #d8eadf);
        color: #17332a;
      }

      main {
        width: min(560px, calc(100vw - 32px));
        padding: 32px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 20px 60px rgba(23, 51, 42, 0.12);
      }

      h1 {
        margin-top: 0;
      }

      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: #edf5f1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>El Jardin de Luna Backend</h1>
      <p>El backend esta desplegado y listo para responder desde Render.</p>
      <p>Chequeo rapido: <code>/api/health</code></p>
      <p>Base de rutas: <code>/api</code></p>
    </main>
  </body>
</html>
